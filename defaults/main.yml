---
# By default, don't reconfigure pam and ...
ldap_reconfiguration: false
restrit_access: true
restrit_ssh_access: false
# Normaly configuration go into /etc/openldap/ (like /etc/openldap/ldap.conf & /etc/openldap/cacerts
# But Debian Wheezy choose : /etc/ldap
ldap_dir: "{% if ansible_distribution == 'Debian'  or ansible_distribution == 'Ubuntu' %}/etc/ldap{% else %}/etc/openldap{% endif %}"
password_policy: false
ssh_AuthorizedKeys:
  - {regexp: '^(.*)AuthorizedKeysCommandUser (.*)', line: 'AuthorizedKeysCommandUser root'}
  - {regexp: '^(.*)AuthorizedKeysCommand (.*)', line: 'AuthorizedKeysCommand /usr/bin/sss_ssh_authorizedkeys'}

sssd_services: "{{ ['nss','pam','sudo'] if restrit_ssh_access | bool else ['nss','pam','ssh','sudo'] }}"
